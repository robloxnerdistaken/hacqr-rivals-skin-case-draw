<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hacqr-rivals-skin-case-draw</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom, #0f0f1a, #1a1a2e);
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 620px; margin: 0 auto; }
    h1 { text-align: center; color: #ffcc00; text-shadow: 0 0 10px #ff9900; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #aaaaff; margin-bottom: 30px; }
    form {
      background: rgba(30, 30, 60, 0.85);
      padding: 30px;
      border-radius: 16px;
      border: 1px solid #444466;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      margin-bottom: 40px;
    }
    label { display: block; margin: 16px 0 8px; font-weight: 600; color: #ccd; }
    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #222244;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 24px;
      background: linear-gradient(90deg, #ff6600, #ff9933);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { transform: scale(1.03); box-shadow: 0 0 15px #ff9900; }
    #status { text-align: center; margin: 20px 0; font-weight: bold; font-size: 1.1em; }
    .success { color: #44ff88; }
    .error { color: #ff5555; }

    #admin {
      background: rgba(20, 20, 40, 0.95);
      padding: 25px;
      border-radius: 16px;
      border: 1px solid #444;
      margin-top: 40px;
    }
    #entries-list {
      max-height: 400px;
      overflow-y: auto;
      background: #1a1a33;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
    }
    .entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #333366;
      font-size: 1em;
    }
    .entry:last-child { border-bottom: none; }
    .delete-btn {
      background: #cc0000;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      line-height: 28px;
      text-align: center;
      cursor: pointer;
    }
    .delete-btn:hover { background: #ff3333; }

    #winners {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0, 80, 0, 0.4);
      border-radius: 12px;
      border: 1px solid #006600;
    }
    #winners h3 { color: #88ff88; margin-top: 0; }

    #admin-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #ff6600, #ff9933);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(255,102,0,0.5);
      cursor: pointer;
      z-index: 9999;
      transition: all 0.3s;
    }
    #admin-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(255,102,0,0.7);
    }

    #clearAllBtn {
      background: #cc0000 !important;
      color: white !important;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: bold;
      cursor: pointer;
      margin: 20px auto;
      display: block;
      width: auto;
    }
    #clearAllBtn:hover { background: #ff3333 !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>Hacqr RIVALS 皮膚箱抽獎</h1>
  <div class="subtitle">輸入 Roblox ID + 選箱子 → 直播現場開獎送皮膚！</div>

  <form id="entryForm">
    <label for="robloxId">你的 Roblox ID / Username</label>
    <input type="text" id="robloxId" required placeholder="例如：hAcKe_520" />

    <label for="box">你要抽哪個皮膚箱？</label>
    <select id="box" required>
      <option value="">請選擇</option>
      <option value="1">Skin Case 1</option>
      <option value="2">Skin Case 2</option>
      <option value="3">Skin Case 3</option>
    </select>

    <label for="memberCode">會員專屬代碼（會員可刷最多20次，非會員限1次）</label>
    <input type="text" id="memberCode" placeholder="輸入你的專屬代碼（會員限定）" />

    <button type="submit">參加抽獎！</button>
  </form>

  <div id="status"></div>
</div>

<button id="admin-toggle">主持</button>

<div id="admin" class="container" style="display:none !important;">
  <h2>主持控制面板</h2>
  <p>目前參加人數：<span id="count">0</span> 人</p>

  <label for="numWinners">要抽出幾位贏家？</label>
  <input type="number" id="numWinners" min="1" max="20" value="3" style="width:100px; padding:10px;" />

  <button id="drawBtn">開始抽獎！</button>

  <button id="clearAllBtn">
    全部清空參加記錄（小心！不可復原）
  </button>

  <div id="entries-list"></div>

  <div id="winners">
    <h3>中獎名單</h3>
    <div id="winnersList"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBZ5uXvkLx4A1NeJAUWh-60zdBruQMieLs",
    authDomain: "hacqr-rivals-skin-case-draw.firebaseapp.com",
    databaseURL: "https://hacqr-rivals-skin-case-draw-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hacqr-rivals-skin-case-draw",
    storageBucket: "hacqr-rivals-skin-case-draw.firebasestorage.app",
    messagingSenderId: "671365149357",
    appId: "1:671365149357:web:e716efdf915c1ceadc8c24",
    measurementId: "G-WMZE6QQLZX"
  };

  const appScript = document.createElement('script');
  appScript.src = "https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js";
  document.head.appendChild(appScript);

  const dbScript = document.createElement('script');
  dbScript.src = "https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js";
  document.head.appendChild(dbScript);

  dbScript.onload = function() {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const entriesRef = db.ref('entries');

    const form = document.getElementById('entryForm');
    const status = document.getElementById('status');

    const MEMBER_CODE = "HACQRVIP520";
    const MAX_MEMBER_SUBMIT = 20;

    document.getElementById('admin').style.display = 'none';

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      let robloxId = document.getElementById('robloxId').value;
      const box = document.getElementById('box').value;
      const codeInput = document.getElementById('memberCode').value.trim();

      if (!robloxId.trim() || !box) {
        status.textContent = "請填完整 Roblox ID 和選擇箱子！";
        status.className = "error";
        return;
      }

      let normalizedId = robloxId.trim().toLowerCase();
      normalizedId = normalizedId.replace(/[^a-z0-9_]/g, '');
      const safeKey = normalizedId || 'invalid_' + Date.now();

      const displayId = robloxId.trim();

      const entryRef = entriesRef.child(safeKey);

      entryRef.once('value').then((snapshot) => {
        const data = snapshot.val() || { submitCount: 0 };
        const currentCount = data.submitCount || 0;
        const isMember = codeInput === MEMBER_CODE;

        if (currentCount >= 1 && !isMember) {
          status.textContent = "你已經參加過了！（非會員限 1 次）";
          status.className = "error";
          return;
        }

        if (isMember && currentCount >= MAX_MEMBER_SUBMIT) {
          status.textContent = `會員已達上限（最多 ${MAX_MEMBER_SUBMIT} 次）！`;
          status.className = "error";
          return;
        }

        const newData = {
          robloxId: displayId,
          box: box,
          timestamp: Date.now(),
          submitCount: currentCount + 1,
          isMember: isMember,
          lastCode: isMember ? codeInput : null
        };

        entryRef.set(newData).then(() => {
          status.textContent = isMember
            ? `會員專屬！第 ${newData.submitCount} 次提交成功（最多 ${MAX_MEMBER_SUBMIT} 次）～`
            : "提交成功！祝你好運！";
          status.className = "success";
          form.reset();
        }).catch(err => {
          status.textContent = "提交失敗：" + err.message;
          status.className = "error";
        });
      }).catch(err => {
        status.textContent = "檢查失敗：" + err.message;
        status.className = "error";
      });
    });

    // 主持面板開啟
    document.getElementById('admin-toggle').addEventListener('click', () => {
      const password = prompt("這是主持面板，請輸入密碼：");
      if (password === "rivalsdraw2026") {
        document.getElementById('admin').style.display = 'block';
        document.getElementById('admin-toggle').style.display = 'none';
      } else {
        alert("密碼錯誤！");
      }
    });

    // 一鍵清空全部記錄
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (confirm("真的要刪除所有參加記錄嗎？\n這會清空所有資料，無法復原！\n確定繼續？")) {
        entriesRef.set(null)
          .then(() => {
            alert("已全部清空！現在可以開始新的抽獎～");
          })
          .catch(err => {
            alert("清空失敗：" + err.message);
          });
      }
    });

    const countEl = document.getElementById('count');
    const listEl = document.getElementById('entries-list');
    const winnersList = document.getElementById('winnersList');

    entriesRef.on('value', (snapshot) => {
      const data = snapshot.val();
      let count = 0;
      let html = "";

      if (data) {
        count = Object.keys(data).length;
        Object.keys(data).forEach(key => {
          const entry = data[key];
          const submitInfo = entry.submitCount > 1 ? ` (${entry.submitCount} 次)` : '';
          html += `
            <div class="entry">
              <span>${entry.robloxId} → Skin Case ${entry.box}${submitInfo}</span>
              <button class="delete-btn" onclick="deleteEntry('${key}')">×</button>
            </div>
          `;
        });
      }
      countEl.textContent = count;
      listEl.innerHTML = html || "<p style='color:#888; text-align:center;'>還沒有人參加...</p>";
    });

    window.deleteEntry = function(key) {
      if (confirm("確定刪除這筆記錄？")) {
        entriesRef.child(key).remove();
      }
    };

    document.getElementById('drawBtn').addEventListener('click', () => {
      entriesRef.once('value').then((snapshot) => {
        const data = snapshot.val();
        if (!data || Object.keys(data).length === 0) {
          alert("目前還沒有人參加！");
          return;
        }

        const entries = Object.values(data);
        const num = parseInt(document.getElementById('numWinners').value) || 3;

        if (num > entries.length) {
          alert(`參加人數只有 ${entries.length} 人，無法抽出 ${num} 位！`);
          return;
        }

        for (let i = entries.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [entries[i], entries[j]] = [entries[j], entries[i]];
        }

        const winners = entries.slice(0, num);
        let winHtml = "";
        winners.forEach(w => {
          winHtml += `<div style="font-size:1.4em; margin:15px 0; color:#88ff88;">
            <strong>${w.robloxId}</strong> → Skin Case ${w.box} (${w.submitCount || 1} 次)
          </div>`;
        });

        winnersList.innerHTML = winHtml;
        alert(`已抽出 ${num} 位中獎者！`);
      });
    });
  };
</script>

</body>
</html>
