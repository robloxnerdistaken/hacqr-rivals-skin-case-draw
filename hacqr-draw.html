<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hacqr-rivals-skin-case-draw</title>
  <style>
    /* 樣式保持不變，省略以節省空間，你可以直接從上一個版本複製 */
    body { /* ... */ }
    /* ... 其他 CSS ... */
  </style>
</head>
<body>

<div class="container">
  <h1>hacqr RIVALS 皮膚箱抽獎</h1>
  <div class="subtitle">輸入 Roblox ID + 選箱子 → 直播現場開獎送皮膚！</div>

  <form id="entryForm">
    <label for="robloxId">你的 Roblox ID / Username</label>
    <input type="text" id="robloxId" required placeholder="例如：hAcKe_520" />

    <label for="box">你要抽哪個皮膚箱？</label>
    <select id="box" required>
      <option value="">請選擇</option>
      <option value="1">Skin Case 1</option>
      <option value="2">Skin Case 2</option>
      <option value="3">Skin Case 3</option>
    </select>

    <button type="submit">參加抽獎！</button>
  </form>

  <div id="status"></div>
</div>

<!-- 右下角主持按鈕 -->
<button id="admin-toggle">主持</button>

<!-- 主持面板 -->
<div id="admin" class="container">
  <h2>主持控制面板</h2>
  <p>目前參加人數：<span id="count">0</span> 人</p>

  <label for="numWinners">要抽出幾位贏家？</label>
  <input type="number" id="numWinners" min="1" max="20" value="3" style="width:100px; padding:10px;" />

  <button id="drawBtn">開始抽獎！</button>

  <div id="entries-list"></div>

  <div id="winners">
    <h3>中獎名單</h3>
    <div id="winnersList"></div>
  </div>
</div>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyBZ5uXvkLx4A1NeJAUWh-60zdBruQMieLs",
    authDomain: "hacqr-rivals-skin-case-draw.firebaseapp.com",
    databaseURL: "https://hacqr-rivals-skin-case-draw-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hacqr-rivals-skin-case-draw",
    storageBucket: "hacqr-rivals-skin-case-draw.firebasestorage.app",
    messagingSenderId: "671365149357",
    appId: "1:671365149357:web:e716efdf915c1ceadc8c24",
    measurementId: "G-WMZE6QQLZX"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const entriesRef = ref(db, 'entries');

  const form = document.getElementById('entryForm');
  const status = document.getElementById('status');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    let robloxId = document.getElementById('robloxId').value.trim();
    const box = document.getElementById('box').value;

    if (!robloxId || !box) {
      status.textContent = "請填完整 Roblox ID 和選擇箱子！";
      status.className = "error";
      return;
    }

    // 轉成小寫 + 安全 key（避免特殊字元）
    const safeKey = robloxId.toLowerCase().replace(/[^a-z0-9_-]/g, '_');

    // 檢查是否已存在
    const entryRef = ref(db, 'entries/' + safeKey);
    onValue(entryRef, (snapshot) => {
      if (snapshot.exists()) {
        // 已存在 → 擋掉
        status.textContent = "你已經參加過了！每個 Roblox ID 只能參加一次～";
        status.className = "error";
      } else {
        // 不存在 → 新增
        set(entryRef, {
          robloxId: robloxId,  // 保留原始大小寫
          box,
          timestamp: Date.now()
        })
        .then(() => {
          status.textContent = "提交成功！已進入抽獎名單～ 祝你好運！";
          status.className = "success";
          form.reset();
        })
        .catch(err => {
          status.textContent = "提交失敗：" + err.message;
          status.className = "error";
          console.error(err);
        });
      }
    }, { onlyOnce: true });  // 只查一次，不持續監聽
  });

  // 主持按鈕、面板、刪除、抽獎邏輯保持不變（從上一個版本複製過來）
  document.getElementById('admin-toggle').addEventListener('click', () => {
    const password = prompt("這是主持面板，請輸入密碼：");
    if (password === "rivalsdraw2026") {  // ← 記得改成你的密碼
      document.getElementById('admin').style.display = 'block';
      document.getElementById('admin-toggle').style.display = 'none';
    } else {
      alert("密碼錯誤！");
    }
  });

  const countEl = document.getElementById('count');
  const listEl = document.getElementById('entries-list');
  const winnersList = document.getElementById('winnersList');

  onValue(entriesRef, (snapshot) => {
    const data = snapshot.val();
    let count = 0;
    let html = "";

    if (data) {
      count = Object.keys(data).length;
      Object.keys(data).forEach(key => {
        const entry = data[key];
        html += `
          <div class="entry">
            <span>${entry.robloxId} → Skin Case ${entry.box}</span>
            <button class="delete-btn" data-key="${key}">×</button>
          </div>
        `;
      });
    }
    countEl.textContent = count;
    listEl.innerHTML = html || "<p style='color:#888; text-align:center;'>還沒有人參加...</p>";

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (confirm(`確定要刪除 ${data[key].robloxId} 的參加記錄？`)) {
          remove(ref(db, 'entries/' + key))
            .then(() => console.log("已刪除"))
            .catch(err => alert("刪除失敗：" + err.message));
        }
      });
    });
  });

  document.getElementById('drawBtn').addEventListener('click', () => {
    onValue(entriesRef, (snapshot) => {
      const data = snapshot.val();
      if (!data || Object.keys(data).length === 0) {
        alert("目前還沒有人參加！");
        return;
      }

      const entries = Object.values(data);
      const num = parseInt(document.getElementById('numWinners').value) || 3;

      if (num > entries.length) {
        alert(`參加人數只有 ${entries.length} 人，無法抽出 ${num} 位！`);
        return;
      }

      for (let i = entries.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [entries[i], entries[j]] = [entries[j], entries[i]];
      }

      const winners = entries.slice(0, num);
      let winHtml = "";
      winners.forEach(w => {
        winHtml += `<div style="font-size:1.4em; margin:15px 0; color:#88ff88;">
          <strong>${w.robloxId}</strong> → Skin Case ${w.box}
        </div>`;
      });

      winnersList.innerHTML = winHtml;
      alert(`已抽出 ${num} 位中獎者！可以直接螢幕分享公布～`);
    }, { onlyOnce: true });
  });
</script>

</body>
</html>
